<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>

        <div class="credentials-panel signin">
            <h2 class="slide-element">Login</h2>
            <form action="#">
                <div class="field-wrapper slide-element">
                    <input type="text" id="loginUsername" required>
                    <label>Username</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" id="loginPassword" required>
                    <label>Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button type="button" class="submit-button" onclick="login()">Login</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Don't have an account? <br> 
                        <a href="#" class="register-trigger">Sign Up</a>
                    </p>
                </div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">WELCOME BACK!</h2>
        </div>

        <div class="credentials-panel signup">
            <h2 class="slide-element">Register</h2>
            <form action="#">
                <div class="field-wrapper slide-element">
                    <input type="text" id="regUsername" required>
                    <label>Username</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="email" id="regEmail" required>
                    <label>Email</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" id="regPassword" required>
                    <label>Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button type="button" class="submit-button" onclick="register()">Register</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Already have an account? <br> 
                        <a href="#" class="login-trigger">Sign In</a>
                    </p>
                </div>
            </form>
        </div>

        <div class="welcome-section signup">
            <h2 class="slide-element">WELCOME!</h2>
        </div>
    </div>

    <div class="footer">
        <p>Made with ❤️ by ODRS TEAM</p>
    </div>

    <script src="style.js"></script>
<script>
// REGISTER FUNCTION
function register() {
  let username = document.getElementById("regUsername").value;
  let email = document.getElementById("regEmail").value;
  let password = document.getElementById("regPassword").value;

  localStorage.setItem("regUsername", username);
  localStorage.setItem("regEmail", email);
  localStorage.setItem("regPassword", password);

  alert("Registered Successfully ✅");
}

// LOGIN FUNCTION
function login() {
  let username = document.getElementById("loginUsername").value;
  let password = document.getElementById("loginPassword").value;

  let storedUser = localStorage.getItem("regUsername");
  let storedPass = localStorage.getItem("regPassword");

  if (username === storedUser && password === storedPass) {

    localStorage.setItem("username", storedUser);
    localStorage.setItem("email", localStorage.getItem("regEmail"));

    window.location.href = "home.html";

  } else {
    alert("Invalid Username or Password ❌");
  }
}
</script>
</body>
</html>
